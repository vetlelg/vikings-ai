kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
}

engine {
  tick-rate-ms = 5000
  tick-rate-ms = ${?TICK_RATE_MS}
  grid-width = 40
  grid-height = 40
}

llm {
  provider = "stub"
  provider = ${?LLM_PROVIDER}
  model = "claude-sonnet-4-20250514"
  model = ${?LLM_MODEL}
  api-key = ""
  api-key = ${?LLM_API_KEY}
  max-tokens = 512
}

bridge {
  port = 8080
  port = ${?BRIDGE_PORT}
  replay-file = "recordings/replay.jsonl"
}
